<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpenChat</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0e0e;
    --fg: #d4d4d4;
    --green: #39ff14;
    --green-dim: #1a6e06;
    --border: rgba(200,200,200,0.18);
    --font-hand: 'Caveat', cursive;
    --font-mono: 'Share Tech Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-hand);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .frame {
    width: calc(100vw - 48px);
    height: calc(100vh - 48px);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .terminal-badge {
    position: absolute;
    top: 18px;
    left: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(200,200,200,0.3);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .terminal-badge .dots {
    display: flex;
    gap: 5px;
  }
  .terminal-badge .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(200,200,200,0.15);
  }

  .clock {
    position: absolute;
    top: 18px;
    right: 22px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(200,200,200,0.3);
    letter-spacing: 1px;
  }

  .title {
    font-family: var(--font-hand);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 400;
    color: var(--fg);
    letter-spacing: -1px;
    margin-bottom: 80px;
    position: relative;
  }


  .title::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: var(--border);
  }

  .gen-btn {
    font-family: var(--font-hand);
    font-size: 20px;
    font-weight: 400;
    color: var(--fg);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 14px 64px;
    cursor: pointer;
    letter-spacing: 0.3px;
    position: relative;
    transition: border-color 0.2s, color 0.2s;
    outline: none;
  }
  .gen-btn:hover {
    border-color: rgba(200,200,200,0.5);
    color: #fff;
  }
  .gen-btn:active {
    transform: scale(0.98);
  }

  .result-area {
    margin-top: 32px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 560px;
  }
  .result-area.visible { display: flex; }

  /* terminal log lines */
  .log-block {
    width: 100%;
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(200,200,200,0.45);
    line-height: 1.9;
    text-align: left;
    padding: 0 8px;
  }
  .log-block .ok { color: var(--green); }
  .log-block .info { color: rgba(200,200,200,0.6); }

  /* link row */
  .link-row {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 50px;
    display: flex;
    align-items: center;
    padding: 12px 20px 12px 28px;
    gap: 12px;
    background: rgba(255,255,255,0.02);
  }
  .link-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--green);
    min-width: 0;
  }
  .link-row button {
    font-family: var(--font-hand);
    font-size: 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--fg);
    padding: 6px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
  }
  .link-row button:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
  .link-row button.copied { color: var(--green); border-color: var(--green-dim); }


  .status-bar {
    position: absolute;
    bottom: 18px;
    left: 22px;
    right: 22px;
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(200,200,200,0.22);
    letter-spacing: 0.5px;
  }
  .status-bar .alive { color: rgba(57,255,20,0.4); }

  /* new-link small button below result */
  .new-btn {
    font-family: var(--font-hand);
    font-size: 16px;
    background: transparent;
    border: none;
    color: rgba(200,200,200,0.35);
    cursor: pointer;
    letter-spacing: 0.3px;
    padding: 4px 0;
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-color: rgba(200,200,200,0.2);
  }
  .new-btn:hover { color: rgba(200,200,200,0.7); }

  /* loading dots inside button */
  .loading-dots { display: none; gap: 4px; justify-content: center; align-items: center; }
  .loading-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--fg);
    animation: ld 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ld {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>
<body>

<div class="frame">

  <!-- top-left badge -->
  <div class="terminal-badge">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    openchat-session
  </div>
  <div class="clock" id="clock">--:--:--</div>


  <h1 class="title">OpenChat</h1>
  <button class="gen-btn" id="genBtn" onclick="generate()">
    <span id="btnLabel">generate a chat link</span>
    <span class="loading-dots" id="btnDots">
      <span></span><span></span><span></span>
    </span>
  </button>
  <div class="result-area" id="resultArea">
    <div class="log-block" id="logBlock"></div>
    <div class="link-row">
      <input id="linkOut" readonly />
      <button id="copyBtn" onclick="copyLink()">copy</button>
    </div>
    <button class="new-btn" onclick="reset()">generate another</button>
  </div>

  <div class="status-bar">
    <span>guest@openchat:~$</span>
    <span><span class="alive">&#9679;</span> connected</span>
    <span id="dateEl"></span>
  </div>

</div>

<script>
function pad(n){ return String(n).padStart(2,'0'); }

function tick(){
  const d = new Date();
  document.getElementById('clock').textContent =
    pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  document.getElementById('dateEl').textContent =
    d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}
tick(); setInterval(tick, 1000);

async function generate(){
  const btn = document.getElementById('genBtn');
  const label = document.getElementById('btnLabel');
  const dots = document.getElementById('btnDots');
  const resultArea = document.getElementById('resultArea');
  const logBlock = document.getElementById('logBlock');

  btn.disabled = true;
  label.style.display = 'none';
  dots.style.display = 'flex';

  resultArea.classList.add('visible');
  logBlock.innerHTML = '';

  const logs = [
    '$ ./create-link.sh',
    '[....] resolving host...',
    '[....] opening socket...',
    '[....] signing token...'
  ];

  for(const text of logs){
    await new Promise(r => setTimeout(r, 300));
    const div = document.createElement('div');
    div.textContent = text;
    logBlock.appendChild(div);
  }

  try {
    const res = await fetch('http://localhost:5008/create-chatLink');
    const data = await res.json();

    if (!data.link) throw new Error("No link");

    const ok = document.createElement('div');
    ok.className = 'ok';
    ok.textContent = '[ OK ] link ready';
    logBlock.appendChild(ok);

    const chatId = data.chatId || data.link.split('/').pop();


    document.getElementById('linkOut').value =
      `http://localhost:5008/chat/${chatId}`;


  } catch(err){
    console.error(err);

    const error = document.createElement('div');
    error.style.color = 'red';
    error.textContent = '[ ERROR ] failed to create link';
    logBlock.appendChild(error);
  }

  btn.disabled = false;
  label.style.display = 'inline';
  dots.style.display = 'none';
  label.textContent = 'regenerate';
}
function copyLink(){
  const inp = document.getElementById('linkOut');
  inp.select();
  document.execCommand('copy');
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
}

function reset(){
  document.getElementById('resultArea').classList.remove('visible');
  document.getElementById('btnLabel').textContent = 'generate a chat link';
}
</script>
</body>
</html>
