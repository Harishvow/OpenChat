<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
<title>openchat — tty1</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:        #0a0a0f;
  --bg1:       #0e0e14;
  --bg2:       #14141c;
  --fg:        #e8e8f0;
  --fg-dim:    #6b6b80;
  --fg-mid:    #888;
  --blue:      #6aafff;
  --blue-d:    #1e3a6e;
  --blue-bg:   #0d1a35;
  --cyan:      #5eecd5;
  --cyan-d:    #0e2a22;
  --cyan-bd:   #18483a;
  --mono:      'JetBrains Mono', monospace;

  /* sizing tokens — desktop */
  --topbar-h:   44px;
  --bar-h:      28px;
  --input-h:    auto;
  --bubble-max: 65%;
  --pad-x:      20px;
  --pad-msg:    16px;
  --fs-base:    13px;
  --fs-meta:    10px;
  --fs-sys:     11px;
  --fs-bar:     10px;
}

/* ── mobile overrides ── */
@media (max-width: 600px) {
  :root {
    --topbar-h:   48px;
    --bar-h:      0px;
    --bubble-max: 82%;
    --pad-x:      12px;
    --pad-msg:    10px;
    --fs-base:    14px;
    --fs-meta:    11px;
    --fs-sys:     11px;
  }
}

html {
  height: 100%;
  background: var(--bg);
}

@keyframes msgSlideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes msgSlideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

body {
  font-family: var(--mono);
  font-size: var(--fs-base);
  font-weight: 300;
  color: var(--fg);
  background: var(--bg);
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ────────────────────────────
   TOP BAR
──────────────────────────── */
.topbar {
  flex-shrink: 0;
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  background: var(--bg);
  border-bottom: 1px solid #1a1a24;
  display: flex;
  align-items: center;
  padding: 0 var(--pad-x);
  gap: 6px;
  /* safe area top (notch) */
  padding-top: env(safe-area-inset-top);
}

.tb-logo  { color: var(--blue); font-weight: 500; font-size: var(--fs-base); letter-spacing: 0.3px; text-shadow: 0 0 12px rgba(106,175,255,0.3); }
.tb-sep   { color: var(--fg-dim); }
.tb-room  {
  color: var(--fg-mid);
  font-size: 11px;
  max-width: 120px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tb-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 11px;
}
.tb-user   { color: var(--blue); font-weight: 500; }
.tb-status { color: var(--fg-dim); }
.tb-status.live { color: #3a8a4a; }
.tb-clock  { color: var(--fg-dim); font-variant-numeric: tabular-nums; }

/* hide some topbar items on mobile */
@media (max-width: 600px) {
  .tb-clock  { display: none; }
  .tb-status { display: none; }
  .tb-room   { max-width: 80px; }
}

/* ────────────────────────────
   MESSAGES
──────────────────────────── */
#messages {
  flex: 1;
  min-height: 0;          /* critical — allows flex child to shrink */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: var(--pad-msg) var(--pad-x);
  background: var(--bg);
}
#messages::-webkit-scrollbar       { width: 2px; }
#messages::-webkit-scrollbar-thumb { background: #181818; border-radius: 2px; }

/* empty state */
#empty {
  margin: auto;
  text-align: center;
  color: var(--fg-dim);
  font-size: 12px;
  line-height: 2;
  user-select: none;
}
#empty pre {
  color: #161616;
  font-size: 11px;
  line-height: 1.4;
  margin-bottom: 12px;
  white-space: pre;
}
@media (max-width: 600px) {
  #empty pre { display: none; }
}

/* sys event line */
.sys-line {
  align-self: center;
  font-size: var(--fs-sys);
  color: #7a7a90;
  padding: 6px 16px;
  margin: 8px 0;
  letter-spacing: 0.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  background: rgba(255,255,255,0.03);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}
.sys-line .b { color: #4a4a5a; }

/* message row */
.msg-row {
  display: flex;
  flex-direction: column;
  max-width: var(--bubble-max);
  gap: 4px;
  margin-bottom: 4px;
}
.msg-row.me    { align-self: flex-end;   align-items: flex-end;   animation: msgSlideInRight 0.25s ease-out; }
.msg-row.other { align-self: flex-start; align-items: flex-start; animation: msgSlideInLeft 0.25s ease-out; }

/* meta: [ts] username */
.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 6px;
  font-size: var(--fs-meta);
  color: var(--fg-dim);
}
.msg-row.me .msg-meta { flex-direction: row-reverse; }

.meta-ts   { color: #5a5a6a; font-variant-numeric: tabular-nums; }
.meta-user { font-weight: 500; letter-spacing: 0.3px; }
.meta-user.me    { color: var(--blue); text-shadow: 0 0 8px rgba(106,175,255,0.4); }
.meta-user.other { color: var(--cyan); text-shadow: 0 0 8px rgba(94,236,213,0.4); }

/* bubble */
.bubble {
  padding: 10px 14px;
  font-size: var(--fs-base);
  font-weight: 400;
  line-height: 1.6;
  word-break: break-word;
  border: 1px solid;
  position: relative;
  color: #ffffff;
}

.msg-row.me .bubble {
  background: linear-gradient(135deg, #1a3a6e 0%, #0d2550 100%);
  border-color: #2a4a8e;
  color: #ffffff;
  border-radius: 14px 4px 14px 14px;
  box-shadow: 0 2px 12px rgba(106,175,255,0.08);
}
.msg-row.other .bubble {
  background: linear-gradient(135deg, #143832 0%, #0c2820 100%);
  border-color: #1e5848;
  color: #ffffff;
  border-radius: 4px 14px 14px 14px;
  box-shadow: 0 2px 12px rgba(94,236,213,0.08);
}

/* corner tail */
.msg-row.me .bubble::after {
  content: '';
  position: absolute;
  top: 0; right: -6px;
  border-top: 6px solid #2a4a8e;
  border-left: 6px solid transparent;
}
.msg-row.other .bubble::after {
  content: '';
  position: absolute;
  top: 0; left: -6px;
  border-top: 6px solid #1e5848;
  border-right: 6px solid transparent;
}

/* ────────────────────────────
   INPUT
──────────────────────────── */
.input-wrap {
  flex-shrink: 0;
  background: var(--bg);
  border-top: 1px solid #1a1a24;
  padding-bottom: env(safe-area-inset-bottom);
}

.input-prompt {
  padding: 7px var(--pad-x) 2px;
  font-size: 11px;
  color: var(--fg-dim);
  display: flex;
  align-items: center;
  gap: 0;
  line-height: 1;
}
.p-user  { color: var(--blue); font-weight: 500; }
.p-at    { color: #3a3a4a; }
.p-host  { color: var(--cyan); }
.p-path  { color: #3a3a4a; }
.p-arrow { color: var(--blue); margin: 0 6px 0 1px; }

.input-row {
  display: flex;
  align-items: center;
  padding: 4px var(--pad-x) 10px;
  gap: 10px;
}

#msg {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid #2a2a3a;
  outline: none;
  font-family: var(--mono);
  font-weight: 300;
  color: var(--fg);
  caret-color: var(--blue);
  /* 16px prevents iOS Safari auto-zoom */
  font-size: max(16px, var(--fs-base));
  padding: 6px 0;
  line-height: 1.4;
}
#msg::placeholder { color: #3a3a4a; }
#msg:focus        { border-bottom-color: #2a4a80; }

.send-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid #1a2e50;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 400;
  color: var(--fg-mid);
  cursor: pointer;
  letter-spacing: 0.3px;
  /* big enough tap target on mobile */
  padding: 8px 14px;
  min-height: 38px;
  min-width: 60px;
  white-space: nowrap;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.send-btn:hover  { color: var(--blue); border-color: var(--blue-d); }
.send-btn:active { background: var(--blue-bg); }

/* ────────────────────────────
   BOTTOM BAR (desktop only)
──────────────────────────── */
.bottombar {
  flex-shrink: 0;
  border-top: 1px solid #0a0a0a;
  background: #030303;
  padding: 4px var(--pad-x);
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: var(--fs-bar);
  color: #1c1c1c;
  letter-spacing: 0.4px;
  white-space: nowrap;
  overflow: hidden;
}
.bottombar .val  { color: #5a5a6a; }
.bottombar .bval { color: #4080c0; }
.bottombar-right { margin-left: auto; }

@media (max-width: 600px) {
  .bottombar { display: none; }
}

/* ────────────────────────────
   DESKTOP CARD WRAPPER
   On large screens, center the
   chat in a card
──────────────────────────── */
@media (min-width: 900px) {
  body {
    align-items: center;
    justify-content: center;
    background: #060610;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 39px,
        #0a0a0a 39px,
        #0a0a0a 40px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 39px,
        #0a0a0a 39px,
        #0a0a0a 40px
      );
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    width: min(780px, calc(100vw - 60px));
    height: min(720px, calc(100vh - 60px));
    border: 1px solid #181818;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 1px #0e0e0e, 0 24px 80px rgba(0,0,0,0.8);
  }

  /* override body flex so shell works */
  body {
    height: 100vh;
    overflow: hidden;
  }
}

@media (max-width: 899px) {
  .shell {
    display: contents; /* shell is invisible, children go directly into body */
  }
}
</style>
</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="tb-logo">openchat</span>
    <span class="tb-sep">/</span>
    <span class="tb-room" id="topRoom">--</span>
    <div class="tb-right">
      <span class="tb-user"  id="topUser">--</span>
      <span class="tb-status" id="topStatus">connecting</span>
      <span class="tb-clock"  id="topClock">--:--:--</span>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <div id="empty">
      <pre>      /\
     /  \
    /\  /\
   /      \
  /  arch  \
 /  linux   \
/____________\</pre>
      <div style="color:#2a2a2a">no messages yet</div>
      <div style="color:#1a1a1a;font-size:11px;margin-top:4px">start the conversation below</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-prompt">
      <span class="p-user"  id="pUser">user</span>
      <span class="p-at">@</span>
      <span class="p-host">openchat</span>
      <span class="p-path"> ~</span>
      <span class="p-arrow">❯</span>
    </div>
    <div class="input-row">
      <input id="msg" placeholder="type message..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="send-btn" onclick="sendMessage()">send&nbsp;↵</button>
    </div>
  </div>

  <!-- BOTTOM BAR (desktop) -->
  <div class="bottombar">
    <span>tty1</span>
    <span>pid&nbsp;<span class="val" id="pidEl">--</span></span>
    <span>room&nbsp;<span class="bval" id="roomEl">--</span></span>
    <span>msgs&nbsp;<span class="val" id="cntEl">0</span></span>
    <span class="bottombar-right" id="dateEl"></span>
  </div>

</div><!-- /shell -->

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
/* ── clock ── */
function pad(n){ return String(n).padStart(2,'0'); }
function tick(){
  const d = new Date();
  const el = document.getElementById('topClock');
  if(el) el.textContent = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  const de = document.getElementById('dateEl');
  if(de) de.textContent = d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}
tick(); setInterval(tick, 1000);
document.getElementById('pidEl').textContent = Math.floor(Math.random()*60000+1000);

/* ── init ── */
const chatId = window.location.pathname.split('/')[2] || 'general';
document.getElementById('topRoom').textContent = chatId;
document.getElementById('roomEl').textContent  = chatId;

let sender = prompt('username:');
if(!sender || !sender.trim()) sender = 'anon_' + Math.random().toString(36).substring(2,5);
sender = sender.trim().toLowerCase().replace(/\s+/g,'_');

document.getElementById('topUser').textContent = sender;
document.getElementById('pUser').textContent   = sender;

let msgCount = 0;

/* ── socket ── */
const socket = io(window.location.origin, {
  transports: ['websocket', 'polling']
});

socket.on('connect', () => {
  console.log('✅ Socket connected');

  socket.emit('joinRoom', chatId);

  setStatus('connected', true);
});

socket.on('connect_error', (err) => {
  console.error('❌ Socket error:', err);
  setStatus('offline', false);
});

/* LOAD OLD MESSAGES */
console.log('🔥 Fetching messages for chatId:', chatId);

fetch(`/api/messages/${chatId}`)
  .then(r => {
    console.log('Response status:', r.status);
    if (!r.ok) {
      throw new Error(`HTTP ${r.status}`);
    }
    return r.json();
  })
  .then(data => {

    console.log('✅ Fetched messages:', data);
    console.log('Data type:', typeof data);
    console.log('Is array:', Array.isArray(data));
    console.log('Length:', data ? data.length : 'null');

    if (!Array.isArray(data)) {
      console.error('❌ Data is not an array:', data);
      sysLine('error: invalid data format');
      setStatus('offline', false);
      return;
    }

    hideEmpty();

    if (data.length === 0) {
      sysLine('session started');
      console.log('No previous messages');
    } else {

      data.forEach((m, idx) => {

        console.log(`Message ${idx}:`, m);

        addMessage(
          m.sender || 'unknown',
          m.message || '(empty)',
          m.created_at
        );
      });

      sysLine(`${data.length} message(s) loaded`);
    }

    setStatus('connected', true);

  })
  .catch(err => {
    console.error('❌ Fetch error:', err);

    sysLine(`error: ${err.message}`);

    setStatus('offline', false);
  });

/* RECEIVE LIVE MESSAGE */
socket.on('receiveMessage', (data) => {

  console.log('Live message:', data);

  hideEmpty();

  addMessage(
    data.sender || 'unknown',
    data.message || '',
    new Date()
  );

  setStatus('connected', true);
});
/* ── send ── */
function sendMessage(){
  const inp = document.getElementById('msg');
  const txt = inp.value.trim();
  if(!txt) return;
  socket.emit('sendMessage', { chatId, message: txt, sender });
  inp.value = '';
  inp.focus();
}

document.getElementById('msg').addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});

/* ── helpers ── */
function setStatus(text, live){
  const el = document.getElementById('topStatus');
  el.textContent = text;
  el.className = 'tb-status' + (live ? ' live' : '');
}

function ts(){
  const d = new Date();
  return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
}

function addMessage(user, text, createdAt){
  hideEmpty();
  const isMe = user === sender;
  const box  = document.getElementById('messages');

  let time = ts();
  if(createdAt){
    const d = new Date(createdAt);
    time = pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
  }

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMe ? 'me' : 'other');
  row.innerHTML =
    `<div class="msg-meta">
       <span class="meta-ts">[${time}]</span>
       <span class="meta-user ${isMe ? 'me' : 'other'}">${esc(user)}</span>
     </div>
     <div class="bubble">${esc(text)}</div>`;

  box.appendChild(row);
  msgCount++;
  document.getElementById('cntEl').textContent = msgCount;
  scrollDown();
}

function sysLine(text){
  const box = document.getElementById('messages');
  const el  = document.createElement('div');
  el.className = 'sys-line';
  el.innerHTML = `<span class="b">[</span>*<span class="b">]</span> ${esc(text)}`;
  box.appendChild(el);
  scrollDown();
}

function hideEmpty(){
  const e = document.getElementById('empty');
  if(e) e.remove();
}

function scrollDown(){
  const box = document.getElementById('messages');
  box.scrollTop = box.scrollHeight;
}

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

/* ── keyboard: scroll to bottom when virtual keyboard opens ── */
if('visualViewport' in window){
  window.visualViewport.addEventListener('resize', () => {
    scrollDown();
  });
}
</script>
</body>
</html>
