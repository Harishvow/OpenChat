<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #ece5dd;
        }

        #chat-container {
            width: 400px;
            height: 600px;
            margin: 30px auto;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #header {
            background: #075e54;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        #status {
            font-size: 12px;
            color: #ddd;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #efeae2;
        }

        .message {
            max-width: 70%;
            padding: 8px 10px;
            margin: 6px 0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .me {
            background: #dcf8c6;
            margin-left: auto;
        }

        .other {
            background: white;
            margin-right: auto;
        }

        .sender {
            font-size: 11px;
            font-weight: bold;
            color: #555;
        }

        .text {
            font-size: 14px;
        }

        .time {
            font-size: 10px;
            text-align: right;
            color: gray;
        }

        #input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        #msg {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            padding: 12px;
            background: #075e54;
            color: white;
            border: none;
            cursor: pointer;
        }

        #empty {
            text-align: center;
            margin-top: 100px;
            color: gray;
        }
    </style>
</head>

<body>

<div id="chat-container">

    <div id="header">
        <span>Chat Room</span>
        <span id="status">Connecting...</span>
    </div>

    <div id="messages">
        <div id="empty">No messages yet 👋<br>Start chatting!</div>
    </div>

    <div id="input-area">
        <input id="msg" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();

// chatId
const chatId = window.location.pathname.split("/")[2];

// username
let sender = prompt("Enter your name");
if (!sender) sender = "Anonymous";

// join room
socket.emit("joinRoom", chatId);

// load messages
fetch(`/messages/${chatId}`)
  .then(res => res.json())
  .then(data => {

      const empty = document.getElementById("empty");

      if (data.length === 0) {
          document.getElementById("status").innerText = "New Chat 🆕";
      } else {
          empty.style.display = "none";
          document.getElementById("status").innerText = "Connected";

          data.forEach(msg => {
              addMessage(msg.sender, msg.message);
          });
      }
  });

// send message
function sendMessage() {
    const input = document.getElementById("msg");
    const message = input.value.trim();

    if (!message) return;

    socket.emit("sendMessage", {
        chatId,
        message,
        sender
    });

    input.value = "";
}

// enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// receive message
socket.on("receiveMessage", (data) => {
    document.getElementById("empty").style.display = "none";
    addMessage(data.sender, data.message);
});

// add message UI
function addMessage(user, message) {
    const div = document.createElement("div");
    div.classList.add("message");

    if (user === sender) {
        div.classList.add("me");
    } else {
        div.classList.add("other");
    }

    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.innerHTML = `
        <span class="sender">${user}</span>
        <span class="text">${message}</span>
        <span class="time">${time}</span>
    `;

    document.getElementById("messages").appendChild(div);

    // scroll
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
